<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Gales - Recuperar Contraseña</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.12.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-image">
                <div class="auth-image-content">
                    <h2>Hotel Gales</h2>
                    <p>Recupera tu contraseña</p>
                </div>
            </div>

            <div class="auth-form">
                <h1>Recuperar Contraseña</h1>
                <p class="subtitle">Ingresa tu correo electrónico para recibir instrucciones</p>

                <form method="post" action="{{ url_for('auth.recuperar_contrasena') }}">
                    <div class="form-group">
                        <label for="email">CORREO ELECTRÓNICO</label>
                        <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>
                    </div>

                    <button type="submit" class="btn-auth">
                        <i class="bi bi-envelope"></i> Enviar Instrucciones
                    </button>
                </form>

                <div class="auth-footer">
                    <p>¿Recuerdas tu contraseña? 
                        <a href="{{ url_for('auth.login') }}">Iniciar Sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    Swal.fire({
                        title: "{{ '¡Hecho!' if category == 'success' else 'Atención' }}",
                        text: "{{ message }}",
                        icon: "{{ 'success' if category == 'success' else ('error' if category == 'danger' or category == 'error' else 'info') }}",
                        confirmButtonColor: '#d4af37',
                        timer: 3500,
                        timerProgressBar: true
                    });
                {% endfor %}
            {% endif %}
        {% endwith %}
    </script>
</body>
</html>
